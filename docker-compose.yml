version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderflow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: orderflow-auth
    ports:
      - "8081:8081"
    environment:
      - DB_DSN=postgres://postgres:postgres@postgres:5432/orderflow?sslmode=disable
      - JWT_SECRET=shared-secret-123
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: orderflow-order
    ports:
      - "8082:8082"
    environment:
      - DB_DSN=postgres://postgres:postgres@postgres:5432/orderflow?sslmode=disable
      - JWT_SECRET=shared-secret-123
      - PORT=8082
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: orderflow-notifier
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - QUEUE_NAME=order.created
    depends_on:
      rabbitmq:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    container_name: orderflow-catalog
    ports:
      - "8083:8083"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB=catalog
      - PORT=8083
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: orderflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: orderflow-rabbitmq
    ports:
      - "5672:5672"   # AMQP протокол
      - "15672:15672" # Web UI (логин/пароль: guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: orderflow-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: catalog
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: orderflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: nc -z localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: orderflow-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  mongo_data: